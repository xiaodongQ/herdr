id = "codebuddy"
version = "2026.07.13.1"
min_engine_version = 2
updated_at = "2026-07-13T00:00:00Z"
aliases = ["cbc"]

[[rules]]
id = "osc_title_idle"
state = "idle"
priority = 250
region = "osc_title"
visible_idle = true
# Idle: ✺ 前缀，且没有活动指标（· 或 tokens）
regex = ['^\x{273A}[^·]*$']

[[rules]]
id = "osc_progress_idle"
state = "idle"
priority = 250
region = "osc_progress"
regex = ['^4;0']

[[rules]]
id = "idle_prompt"
state = "idle"
priority = 200
region = "prompt_box_body"
visible_idle = true
line_regex = ['^\s*>$']

[[rules]]
id = "idle_prompt_question_shortcut"
state = "idle"
priority = 150
region = "bottom_non_empty_lines(1)"
visible_idle = true
contains = ["? for shortcuts"]

[[rules]]
id = "status_footer_working"
state = "working"
priority = 210
region = "bottom_non_empty_lines(5)"
visible_working = true
# 只有在 title 有活动指标时，底部的 streaming/writing 才表示 working
# 如果 title 无活动指标且显示 prompt，agent 就是 idle
any = [
  { contains = ["streaming"] },
  { contains = ["writing"] },
]

[[rules]]
id = "osc_title_working"
state = "working"
priority = 260
region = "osc_title"
visible_working = true
# 通用活动指标：任意包含 · 或 tokens 或 streaming 的 title 都是 working
any = [
  { regex = ['·'] },
  { contains = ["tokens"] },
  { contains = ["streaming"] },
]

[[rules]]
id = "status_footer_blocked"
state = "blocked"
priority = 300
region = "bottom_non_empty_lines(5)"
visible_blocker = true
any = [
  { contains = ["waiting for approval"] },
  { contains = ["invoke tool"] },
  { contains = ["run this command?"] },
  { contains = ["confirm tool call"] },
  { contains = ["Submit"] },
  { contains = ["操作"] },
  { regex = ['☐'] },
]

[[rules]]
id = "title_bar_idle"
state = "idle"
priority = 100
region = "osc_title"
contains = ["CodeBuddy"]
