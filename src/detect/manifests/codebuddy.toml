# Blocked: approval prompts
[[rules]]
id = "status_footer_blocked"
state = "blocked"
priority = 300
region = "bottom_non_empty_lines(5)"
visible_blocker = true
any = [
  { contains = ["waiting for approval"] },
  { contains = ["invoke tool"] },
  { contains = ["run this command?"] },
  { contains = ["confirm tool call"] },
  { contains = ["Submit"] },
  { contains = ["操作"] },
  { regex = ['☐'] },
]

# Idle: CodeBuddy in title with no activity
[[rules]]
id = "title_bar_idle"
state = "idle"
priority = 100
region = "osc_title"
contains = ["CodeBuddy"]
